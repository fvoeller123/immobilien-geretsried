      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-10px); opacity: 1; }
    }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  <div id="root"></div>

    const { useState, useCallback } = React;

    const FEATURES = [
      { id: "garten", label: "Garten", icon: "🌳" },
      { id: "terrasse", label: "Terrasse", icon: "🪴" },
      { id: "balkon", label: "Balkon", icon: "🏗️" },
      { id: "garage", label: "Garage/Stellplatz", icon: "🚗" },
      { id: "keller", label: "Keller", icon: "🔒" },
      { id: "aufzug", label: "Aufzug", icon: "🛗" },
      { id: "barrierefrei", label: "Barrierefrei", icon: "♿" },
      { id: "einbaukueche", label: "Einbauküche", icon: "🍳" },
      { id: "neubau", label: "Neubau", icon: "🏗️" },
      { id: "erstbezug", label: "Erstbezug", icon: "✨" },
    ];

    const PROPERTY_TYPES = [
      { id: "wohnung", label: "Eigentumswohnung" },
      { id: "haus", label: "Haus" },
      { id: "both", label: "Beides" },
    ];

    const PORTALS = [
      "Immobilienscout24", "Immowelt", "Immonet",
      "Kleinanzeigen", "Wohnungsboerse", "Engel & Völkers",
    ];

    function Tag({ label, icon, active, onClick }) {
      return (
        <button onClick={onClick} style={{
          display: "inline-flex", alignItems: "center", gap: "6px",
          padding: "8px 14px", borderRadius: "999px",
          border: active ? "2px solid #c8a96e" : "2px solid #2a2a2a",
          background: active ? "#c8a96e22" : "transparent",
          color: active ? "#c8a96e" : "#888",
          cursor: "pointer", fontSize: "13px",
          fontFamily: "'DM Sans', sans-serif",
          fontWeight: active ? "600" : "400",
          transition: "all 0.18s ease",
        }}>
          <span>{icon}</span><span>{label}</span>
        </button>
      );
    }

    function Stat({ icon, label }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "13px", color: "#bbb" }}>
          <span>{icon}</span><span>{label}</span>
        </div>
      );
    }

    function PropertyCard({ listing, index }) {
      const [expanded, setExpanded] = useState(false);
      return (
        <div onClick={() => setExpanded(!expanded)} style={{
          background: "#151515", border: "1px solid #222", borderRadius: "16px",
          padding: "22px", display: "flex", flexDirection: "column", gap: "12px",
          animation: `fadeSlide 0.4s ease ${index * 0.07}s both`, cursor: "pointer",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <span style={{ fontSize: "11px", letterSpacing: "0.12em", textTransform: "uppercase", color: "#c8a96e", fontWeight: "600" }}>
                {listing.portal}
              </span>
              <div style={{ fontSize: "16px", fontWeight: "700", color: "#f0ebe0", marginTop: "4px", fontFamily: "'Playfair Display', serif", lineHeight: 1.3 }}>
                {listing.title}
              </div>
            </div>
            <div style={{ fontSize: "20px", fontWeight: "800", color: "#c8a96e", whiteSpace: "nowrap", fontFamily: "'Playfair Display', serif", marginLeft: "12px" }}>
              {listing.price}
            </div>
          </div>

          <div style={{ display: "flex", gap: "16px", flexWrap: "wrap" }}>
            {listing.size && <Stat icon="📐" label={listing.size} />}
            {listing.rooms && <Stat icon="🚪" label={listing.rooms + " Zimmer"} />}
            {listing.type && <Stat icon={listing.type === "Haus" ? "🏡" : "🏢"} label={listing.type} />}
          </div>

          {listing.features && listing.features.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
              {listing.features.map((f, i) => (
                <span key={i} style={{ fontSize: "11px", padding: "3px 10px", borderRadius: "999px", background: "#1e1e1e", color: "#aaa", border: "1px solid #2a2a2a" }}>
                  {f}
                </span>
              ))}
            </div>
          )}

          {expanded && listing.description && (
            <div style={{ fontSize: "13px", color: "#999", lineHeight: "1.6", borderTop: "1px solid #222", paddingTop: "12px", animation: "fadeIn 0.2s ease" }}>
              {listing.description}
            </div>
          )}

          {listing.url && (
            <a href={listing.url} target="_blank" rel="noopener noreferrer"
              onClick={e => e.stopPropagation()}
              style={{ fontSize: "12px", color: "#c8a96e", textDecoration: "none", marginTop: "4px" }}>
              Zum Inserat →
            </a>
          )}
        </div>
      );
    }

    function LoadingDots() {
      return (
        <div style={{ display: "flex", gap: "8px", justifyContent: "center", padding: "40px" }}>
          {[0,1,2].map(i => (
            <div key={i} style={{ width: "10px", height: "10px", borderRadius: "50%", background: "#c8a96e", animation: `bounce 1s ease ${i*0.15}s infinite` }} />
          ))}
        </div>
      );
    }

    function Section({ title, children }) {
      return (
        <div style={{ marginBottom: "24px" }}>
          <div style={{ fontSize: "11px", letterSpacing: "0.14em", textTransform: "uppercase", color: "#555", fontWeight: "600", marginBottom: "12px" }}>
            {title}
          </div>
          {children}
        </div>
      );
    }

    function NumberInput({ label, value, onChange, placeholder }) {
      return (
        <div>
          <div style={{ fontSize: "12px", color: "#555", marginBottom: "6px" }}>{label}</div>
          <input type="number" value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
            style={{ width: "100%", padding: "10px 14px", borderRadius: "10px", border: "1.5px solid #222", background: "#111", color: "#f0ebe0", fontFamily: "'DM Sans', sans-serif", fontSize: "14px", outline: "none" }} />
        </div>
      );
    }

      const [propertyType, setPropertyType] = useState("both");
      const [selectedFeatures, setSelectedFeatures] = useState([]);
      const [minPrice, setMinPrice] = useState("");
      const [maxPrice, setMaxPrice] = useState("");
      const [minRooms, setMinRooms] = useState("");
      const [minSize, setMinSize] = useState("");
      const [listings, setListings] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [summary, setSummary] = useState(null);
      const [searched, setSearched] = useState(false);
      const [activePortals, setActivePortals] = useState([...PORTALS]);

      const toggleFeature = id => setSelectedFeatures(prev => prev.includes(id) ? prev.filter(f => f !== id) : [...prev, id]);
      const togglePortal = p => setActivePortals(prev => prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p]);

      const handleSearch = async () => {
        setLoading(true); setError(null); setListings([]); setSummary(null); setSearched(true);

        const typeLabel = propertyType === "wohnung" ? "Eigentumswohnungen" : propertyType === "haus" ? "Häuser zum Kauf" : "Eigentumswohnungen und Häuser zum Kauf";
        const filters = [];
        if (minPrice) filters.push(`Mindestpreis: ${minPrice} €`);
        if (maxPrice) filters.push(`Maximalpreis: ${maxPrice} €`);
        if (minRooms) filters.push(`Mindest-Zimmeranzahl: ${minRooms}`);
        if (minSize) filters.push(`Mindestfläche: ${minSize} m²`);
        if (selectedFeatures.length > 0) filters.push(`Gewünschte Ausstattung: ${selectedFeatures.join(", ")}`);

        const prompt = `Suche aktuell auf deutschen Immobilienportalen nach ${typeLabel} in 82538 Geretsried.
${filters.length > 0 ? "Filter:\n" + filters.join("\n") : ""}
Liste bis zu 10 aktuelle Angebote. Antworte NUR als valides JSON ohne Markdown-Backticks:
{"listings":[{"portal":"...","title":"...","price":"...","size":"...","rooms":"...","type":"Wohnung oder Haus","features":["..."],"description":"...","url":"..."}],"summary":"Kurze Marktübersicht 2-3 Sätze"}`;

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 4000,
              tools: [{ type: "web_search_20250305", name: "web_search" }],
              messages: [{ role: "user", content: prompt }],
            }),
          });

          const data = await response.json();
          const allText = data.content.map(b => b.type === "text" ? b.text : "").join("\n");

          let parsed = null;
          try { parsed = JSON.parse(allText); } catch {}
          if (!parsed) {
            const m = allText.match(/\{[\s\S]*\}/);
            if (m) try { parsed = JSON.parse(m[0]); } catch {}
          }
          if (!parsed) {
            const m = allText.match(/\[[\s\S]*\]/);
            if (m) try { parsed = { listings: JSON.parse(m[0]) }; } catch {}
          }

          if (parsed) {
            setListings(Array.isArray(parsed.listings) ? parsed.listings : Array.isArray(parsed) ? parsed : []);
            setSummary(parsed.summary || null);
          } else {
            setSummary(allText.slice(0, 800));
          }
        } catch(e) {
          setError("Fehler: " + e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{ minHeight: "100vh", background: "#0e0e0e" }}>
          <div style={{ borderBottom: "1px solid #1a1a1a", padding: "32px 24px 24px", background: "linear-gradient(180deg,#0e0e0e,#111)" }}>
            <div style={{ maxWidth: "780px", margin: "0 auto" }}>
              <div style={{ fontSize: "11px", letterSpacing: "0.18em", textTransform: "uppercase", color: "#c8a96e", marginBottom: "8px", fontWeight: "600" }}>
                📍 82538 Geretsried · Bayern

              <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(28px,5vw,44px)", fontWeight: "800", color: "#f0ebe0", lineHeight: 1.15 }}>
                Immobiliensuche
              </h1>
              <p style={{ color: "#666", fontSize: "14px", marginTop: "8px" }}>KI-gestützte Auswertung aller Portale · Kauf</p>
            </div>
          </div>

          <div style={{ maxWidth: "780px", margin: "0 auto", padding: "28px 24px" }}>

            <Section title="Objekttyp">
              <div style={{ display: "flex", gap: "10px", flexWrap: "wrap" }}>
                {PROPERTY_TYPES.map(t => (
                  <button key={t.id} onClick={() => setPropertyType(t.id)} style={{
                    padding: "10px 22px", borderRadius: "10px", border: "2px solid",
                    borderColor: propertyType === t.id ? "#c8a96e" : "#222",
                    background: propertyType === t.id ? "#c8a96e18" : "#111",
                    color: propertyType === t.id ? "#c8a96e" : "#888",
                    fontFamily: "'DM Sans', sans-serif", fontWeight: "600", fontSize: "14px", cursor: "pointer",
                  }}>{t.label}</button>
                ))}
              </div>
            </Section>

            <Section title="Preisrahmen & Größe">
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
                <NumberInput label="Min. Preis (€)" value={minPrice} onChange={setMinPrice} placeholder="z.B. 200000" />
                <NumberInput label="Max. Preis (€)" value={maxPrice} onChange={setMaxPrice} placeholder="z.B. 600000" />
                <NumberInput label="Min. Zimmer" value={minRooms} onChange={setMinRooms} placeholder="z.B. 3" />
                <NumberInput label="Min. Fläche (m²)" value={minSize} onChange={setMinSize} placeholder="z.B. 80" />
              </div>
            </Section>

            <Section title="Ausstattung">
              <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                {FEATURES.map(f => (
                  <Tag key={f.id} label={f.label} icon={f.icon} active={selectedFeatures.includes(f.id)} onClick={() => toggleFeature(f.id)} />
                ))}
              </div>
            </Section>

            <Section title="Portale">
              <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                {PORTALS.map(p => (
                  <button key={p} onClick={() => togglePortal(p)} style={{
                    padding: "6px 14px", borderRadius: "8px", border: "1.5px solid",
                    borderColor: activePortals.includes(p) ? "#555" : "#1e1e1e",
                    background: activePortals.includes(p) ? "#1e1e1e" : "transparent",
                    color: activePortals.includes(p) ? "#ccc" : "#444",
                    fontFamily: "'DM Sans', sans-serif", fontSize: "12px", cursor: "pointer",
                  }}>
                    {activePortals.includes(p) ? "✓ " : ""}{p}

      const handleSearch = async () => {
        setLoading(true); setError(null); setListings([]); setSummary(null); setSearched(true);

        const typeLabel = propertyType === "wohnung" ? "Eigentumswohnungen" : propertyType === "haus" ? "Häuser zum Kauf" : "Eigentumswohnungen und Häuser zum Kauf";
        const filters = [];
        if (minPrice) filters.push(`Mindestpreis: ${minPrice} €`);
        if (maxPrice) filters.push(`Maximalpreis: ${maxPrice} €`);
        if (minRooms) filters.push(`Mindest-Zimmeranzahl: ${minRooms}`);
        if (minSize) filters.push(`Mindestfläche: ${minSize} m²`);
        if (selectedFeatures.length > 0) filters.push(`Gewünschte Ausstattung: ${selectedFeatures.join(", ")}`);

        const prompt = `Du bist ein Immobilien-Recherche-Assistent. Führe eine umfassende Web-Suche nach ${typeLabel} in 82538 Geretsried und der näheren Umgebung (Wolfratshausen, Bad Tölz, Icking, Egling, Gelting) durch.

Durchsuche dabei ALLE folgenden Quellen gründlich:
1. Immobilienportale: Immobilienscout24, Immowelt, Immonet, Kleinanzeigen, Wohnungsboerse, Engel & Völkers
2. Lokale Maklerbüros in Geretsried und Umgebung (z.B. suche nach "Makler Geretsried", "Immobilien Geretsried Makler")
3. Regionalbanken: Sparkasse Bad Tölz-Wolfratshausen, Raiffeisenbank Isar-Loisachtal, Volksbank Raiffeisenbank Oberbayern Südost
4. Bauträger & Neubau: suche nach "Neubau Geretsried", "Bauträger Geretsried", "Neubauprojekt 82538"
5. Allgemeine Suche: "Haus kaufen Geretsried", "Wohnung kaufen Geretsried", "Immobilien 82538"

${filters.length > 0 ? "Berücksichtige folgende Filter:\n" + filters.join("\n") : "Keine weiteren Filter – zeige alle verfügbaren Angebote."}

Liste bis zu 12 aktuelle Angebote aus möglichst vielen verschiedenen Quellen.
Antworte NUR als valides JSON ohne Markdown-Backticks:
{"listings":[{"portal":"Name der Quelle/des Maklers","title":"...","price":"...","size":"...","rooms":"...","type":"Wohnung oder Haus","features":["..."],"description":"2-3 Sätze zum Objekt","url":"..."}],"summary":"Kurze Marktübersicht 2-3 Sätze mit Preistrend und Verfügbarkeit in Geretsried"}`;

        try {

            const m = allText.match(/\{[\s\S]*\}/);

          }

            const m = allText.match(/\[[\s\S]*\]/);

          }

          if (parsed) {
            setListings(Array.isArray(parsed.listings) ? parsed.listings : Array.isArray(parsed) ? parsed : []);
            setSummary(parsed.summary || null);
          } else {
            setSummary(allText.slice(0, 800));
          }
        } catch(e) {
          setError("Fehler: " + e.message);
        } finally {
          setLoading(false);
        }
      };

            <div style={{ maxWidth: "780px", margin: "0 auto" }}>
              <div style={{ fontSize: "11px", letterSpacing: "0.18em", textTransform: "uppercase", color: "#c8a96e", marginBottom: "8px", fontWeight: "600" }}>

              <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(28px,5vw,44px)", fontWeight: "800", color: "#f0ebe0", lineHeight: 1.15 }}>
                Immobiliensuche

              <p style={{ color: "#666", fontSize: "14px", marginTop: "8px" }}>KI-gestützte Auswertung aller Portale · Kauf</p>
            </div>
          </div>

          <div style={{ maxWidth: "780px", margin: "0 auto", padding: "28px 24px" }}>

            <Section title="Objekttyp">

                  <button key={t.id} onClick={() => setPropertyType(t.id)} style={{
                    padding: "10px 22px", borderRadius: "10px", border: "2px solid",
                    borderColor: propertyType === t.id ? "#c8a96e" : "#222",
                    background: propertyType === t.id ? "#c8a96e18" : "#111",
                    color: propertyType === t.id ? "#c8a96e" : "#888",
                    fontFamily: "'DM Sans', sans-serif", fontWeight: "600", fontSize: "14px", cursor: "pointer",
                  }}>{t.label}</button>
                ))}
              </div>
            </Section>

            <Section title="Preisrahmen & Größe">
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
                <NumberInput label="Min. Preis (€)" value={minPrice} onChange={setMinPrice} placeholder="z.B. 200000" />
                <NumberInput label="Max. Preis (€)" value={maxPrice} onChange={setMaxPrice} placeholder="z.B. 600000" />
                <NumberInput label="Min. Zimmer" value={minRooms} onChange={setMinRooms} placeholder="z.B. 3" />
                <NumberInput label="Min. Fläche (m²)" value={minSize} onChange={setMinSize} placeholder="z.B. 80" />
              </div>
            </Section>

            <Section title="Ausstattung">
              <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                {FEATURES.map(f => (
                  <Tag key={f.id} label={f.label} icon={f.icon} active={selectedFeatures.includes(f.id)} onClick={() => toggleFeature(f.id)} />
                ))}
              </div>
            </Section>

            <Section title="Portale">
              <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
                {PORTALS.map(p => (
                  <button key={p} onClick={() => togglePortal(p)} style={{
                    padding: "6px 14px", borderRadius: "8px", border: "1.5px solid",
                    borderColor: activePortals.includes(p) ? "#555" : "#1e1e1e",
                    background: activePortals.includes(p) ? "#1e1e1e" : "transparent",
                    color: activePortals.includes(p) ? "#ccc" : "#444",
                    fontFamily: "'DM Sans', sans-serif", fontSize: "12px", cursor: "pointer",
                  }}>
                    {activePortals.includes(p) ? "✓ " : ""}{p}
                  </button>
                ))}
              </div>
            </Section>

            <button onClick={handleSearch} disabled={loading} style={{
              width: "100%", padding: "18px", borderRadius: "14px", border: "none",
              background: loading ? "#2a2a2a" : "linear-gradient(135deg,#c8a96e,#a8893e)",
              color: loading ? "#555" : "#0e0e0e", fontSize: "16px", fontWeight: "700",
              fontFamily: "'DM Sans', sans-serif", cursor: loading ? "not-allowed" : "pointer",
              marginBottom: "32px", boxShadow: loading ? "none" : "0 4px 24px #c8a96e33",
            }}>
              {loading ? "Portale werden ausgewertet …" : "🔍 Jetzt suchen"}
            </button>

            {loading && <LoadingDots />}

            {error && (
              <div style={{ background: "#1e0a0a", border: "1px solid #5a1a1a", borderRadius: "12px", padding: "16px", color: "#e88", fontSize: "14px" }}>
                {error}
              </div>
            )}

            {summary && !loading && (
              <div style={{ background: "#111", border: "1px solid #c8a96e33", borderRadius: "14px", padding: "20px", marginBottom: "20px", fontSize: "14px", color: "#bbb", lineHeight: "1.7", animation: "fadeIn 0.4s ease" }}>
                <div style={{ fontSize: "11px", letterSpacing: "0.12em", color: "#c8a96e", textTransform: "uppercase", fontWeight: "600", marginBottom: "8px" }}>📊 Marktübersicht</div>
                {summary}
              </div>
            )}

            {searched && !loading && listings.length > 0 && (
              <>
                <div style={{ fontSize: "12px", color: "#555", marginBottom: "16px" }}>{listings.length} Angebote gefunden</div>
                <div style={{ display: "flex", flexDirection: "column", gap: "14px" }}>
                  {listings.map((l, i) => <PropertyCard key={i} listing={l} index={i} />)}
                </div>
              </>
            )}

            {searched && !loading && listings.length === 0 && !error && !summary && (
              <div style={{ textAlign: "center", color: "#444", padding: "40px 0" }}>Keine Ergebnisse gefunden.</div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

      });
